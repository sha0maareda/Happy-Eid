<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>العجول الهربانة! 🐄</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1828;font-family:'Tajawal',sans-serif;}
#gameCanvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;background:rgba(0,0,0,.55);color:white;z-index:10;}
.hud-score{font-size:1.2rem;font-weight:700;color:#f0c040;}
.hud-level{font-size:1rem;font-weight:700;color:#f0c040;}
#level-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,.9);color:#f0c040;font-size:clamp(1.5rem,6vw,2.8rem);font-weight:900;padding:.8rem 2rem;border-radius:16px;border:2px solid #f0c040;z-index:30;text-align:center;pointer-events:none;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);}
#level-banner.show{transform:translate(-50%,-50%) scale(1);}
#mobile-controls{position:fixed;bottom:1.2rem;left:0;right:0;display:flex;justify-content:center;gap:1rem;z-index:10;}
.ctrl-btn{width:68px;height:68px;border-radius:50%;border:3px solid rgba(255,255,255,.45);background:rgba(0,0,0,.45);color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Tajawal',sans-serif;font-weight:700;user-select:none;-webkit-user-select:none;}
.ctrl-btn:active{background:rgba(0,0,0,.75);}
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:50;padding:1rem;opacity:0;pointer-events:none;transition:opacity .5s;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-card{background:linear-gradient(160deg,#0d3b1a,#1e6b2e);border:2px solid rgba(212,160,23,.55);border-radius:28px;padding:2.5rem 2rem;width:min(440px,95vw);text-align:center;}
.result-emoji{font-size:4.5rem;display:block;margin-bottom:.5rem;animation:bb .8s ease infinite alternate;}
@keyframes bb{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.result-title{font-size:clamp(1.3rem,5vw,2rem);font-weight:900;color:#f0c040;margin-bottom:.3rem;}
.result-name{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;color:white;margin-bottom:.8rem;}
.prize-badge{display:inline-block;background:#d4a017;color:#1a1a1a;font-weight:900;font-size:1.3rem;padding:.4rem 1.4rem;border-radius:50px;margin-bottom:1rem;}
.result-msg{font-size:1rem;color:rgba(255,255,255,.88);line-height:1.8;margin-bottom:1.5rem;white-space:pre-line;}
.result-btns{display:flex;gap:.8rem;}
.retry-btn{flex:1;padding:.85rem;background:transparent;color:#f0c040;border:2px solid #f0c040;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.home-btn{flex:1;padding:.85rem;background:#d4a017;color:#1a1a1a;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.confetti-piece{position:fixed;pointer-events:none;animation:cf linear forwards;border-radius:2px;z-index:100;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#music-btn{position:fixed;bottom:1rem;left:1rem;background:rgba(0,0,0,.5);color:white;border:1px solid rgba(255,255,255,.3);border-radius:50px;padding:.4rem .9rem;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;z-index:20;display:none;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div>المسافة: <span class="hud-score" id="hud-score">0</span>م</div>
  <div class="hud-level" id="hud-level">ليفل 1 🐄</div>
  <div id="hud-lives" style="font-size:1.3rem;letter-spacing:2px">❤️❤️❤️</div>
</div>
<div id="level-banner"></div>
<div id="mobile-controls">
  <button class="ctrl-btn" ontouchstart="doJump()" ontouchend="">🦘<br>قفز</button>
  <button class="ctrl-btn" ontouchstart="keyState.down=true" ontouchend="keyState.down=false">⬇️<br>انحن</button>
</div>
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <span class="result-emoji" id="result-emoji">🐄</span>
    <div class="result-title" id="result-title"></div>
    <div class="result-name"  id="result-name"></div>
    <div class="prize-badge"  id="prize-badge"></div>
    <div class="result-msg"   id="result-msg"></div>
    <div class="result-btns">
      <button class="retry-btn" onclick="restartGame()">🔄 العب تاني</button>
      <button class="home-btn"  onclick="goHome()">🏠 الرئيسية</button>
    </div>
  </div>
</div>
<button id="music-btn" onclick="toggleMusic()">🔊 كتم</button>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;if(game)game.groundY=canvas.height*.72;}
window.addEventListener('resize',resize);

// ===== 5 LEVELS =====
const LEVELS=[
  {dist:0,    speedPxS:220, label:'ليفل 1 🐄',        obstacles:['hay','pit']},
  {dist:300,  speedPxS:300, label:'ليفل 2 🐄🐄',       obstacles:['hay','pit','bar']},
  {dist:650,  speedPxS:390, label:'ليفل 3 🐄🐄🐄',      obstacles:['hay','pit','bar']},
  {dist:1100, speedPxS:490, label:'ليفل 4 🔥',         obstacles:['hay','pit','bar','double']},
  {dist:1650, speedPxS:600, label:'ليفل 5 👑 الوحش!',  obstacles:['hay','pit','bar','double']},
];

const PRIZES=[
  {emoji:'😅',title:'عيد لحمة!',          prize:'مفيش عيدية 😂',      msg:'كل سنة وانت طيب يا {name}!\nالعجول أسرع منك النهارده 🐄💨\nبس عيدك مبارك وعيد سعيد!'},
  {emoji:'💵',title:'ليفل 1 ✅ برافو!',   prize:'🎉 10 جنيه عيدية',   msg:'عيدك مبارك يا {name}! 🎊\nكسبت 10 جنيه عيدية\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'💵',title:'ليفل 2 ✅ ممتاز!',  prize:'💚 50 جنيه عيدية',   msg:'تسلم يا {name}! إنت نمر! 🐯\nكسبت 50 جنيه عيدية\nأدام الله أعيادكم وفرحتكم ورزقكم حج بيته الحرام 🕌🌙'},
  {emoji:'💵',title:'ليفل 3 ✅ خرافي!',  prize:'💛 100 جنيه عيدية',  msg:'يا سلام عليك يا {name}! 🌟\nكسبت 100 جنيه عيدية\nأدام الله أعيادكم وفرحتكم ورزقكم حج بيته الحرام 🕌🌙⭐'},
  {emoji:'💵',title:'ليفل 4 ✅ أسطورة!', prize:'🧡 200 جنيه عيدية', msg:'أسطورة يا {name}! 🦁\nكسبت 200 جنيه عيدية!\nأدام الله أعيادكم وفرحتكم ورزقكم حج بيته الحرام 🕌🌟'},
  {emoji:'🥩',title:'ليفل 5 👑 وحش!',    prize:'🥩 5 كيلو لحمة!',    msg:'يا نينجا العجول يا {name}! 🥷🏆\nعديت كل الليفلات!\nكسبت 5 كيلو لحمة!\nأدام الله أعيادكم وفرحتكم ورزقكم حج بيته الحرام\nكل عام وانتم بخير وسعداء 🌙🌟🎊'},
];

let game, animId, lastTime=null;
const keyState={down:false};

function initGame(){
  resize();
  const H=canvas.height;
  game={
    running:true,frame:0,distance:0,
    speedPxS:LEVELS[0].speedPxS,
    level:0,levelReached:0,lives:3,
    groundY:H*.72,bgX:0,
    cloudX:[.1,.45,.78].map(p=>p*canvas.width),
    player:{x:canvas.width*.2,y:H*.72-75,vy:0,onGround:true,charH:75,invincible:0},
    obstacles:[],particles:[],obstacleTimer:1.5, // seconds
  };
}

// ===== INPUT =====
window.addEventListener('keydown',e=>{
  if([' ','ArrowUp','w'].includes(e.key)){e.preventDefault();doJump();}
  if(['ArrowDown','s'].includes(e.key))keyState.down=true;
});
window.addEventListener('keyup',e=>{if(['ArrowDown','s'].includes(e.key))keyState.down=false;});
canvas.addEventListener('click',doJump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});

function doJump(){
  if(!game||!game.running)return;
  if(game.player.onGround){game.player.vy=-15;game.player.onGround=false;spawnParticles(game.player.x+20,game.player.y+game.player.charH,'#8B6914',6);}
}
function spawnParticles(x,y,color,n){for(let i=0;i<n;i++)game.particles.push({x,y,vx:(Math.random()-.5)*5,vy:-Math.random()*4,life:1,color,size:4+Math.random()*4});}

// ===== OBSTACLES =====
function spawnObstacle(){
  const W=canvas.width,g=game.groundY;
  const types=LEVELS[game.level].obstacles;
  const t=types[Math.floor(Math.random()*types.length)];
  if(t==='hay'){const h=45+Math.random()*30;game.obstacles.push({type:'hay',x:W+60,y:g-h,w:48,h});}
  else if(t==='pit'){game.obstacles.push({type:'pit',x:W+60,y:g,w:80,h:30});}
  else if(t==='bar'){game.obstacles.push({type:'bar',x:W+60,y:g-115,w:18,h:95});}
  else if(t==='double'){
    game.obstacles.push({type:'hay',x:W+60, y:g-48,w:44,h:48});
    game.obstacles.push({type:'hay',x:W+148,y:g-75,w:44,h:75});
  }
}

function checkLevelUp(){
  for(let i=LEVELS.length-1;i>=0;i--){
    if(game.distance>=LEVELS[i].dist&&game.level<i){
      game.level=i;game.speedPxS=LEVELS[i].speedPxS;
      game.levelReached=Math.max(game.levelReached,i);
      showBanner(LEVELS[i].label);break;
    }
  }
}
function showBanner(text){const b=document.getElementById('level-banner');b.textContent=text;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1900);}

// ===== DRAW =====
function drawBg(){
  const W=canvas.width,H=canvas.height,g=game.groundY;
  const sky=ctx.createLinearGradient(0,0,0,g);
  sky.addColorStop(0,'#060d1a');sky.addColorStop(.6,'#1a3a6a');sky.addColorStop(1,'#2a6a9a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,g);
  ctx.save();ctx.fillStyle='#fffde0';ctx.shadowColor='#fffde0';ctx.shadowBlur=35;
  ctx.beginPath();ctx.arc(W*.84,65,42,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a3a6a';ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(W*.84+16,54,36,0,Math.PI*2);ctx.fill();
  ctx.restore();
  const t=Date.now()*.001;
  [[.08,.06],[.22,.1],[.38,.04],[.52,.14],[.64,.05],[.28,.18],[.72,.09],[.14,.22]].forEach(([sx,sy],i)=>{
    ctx.fillStyle=`rgba(255,255,220,${.4+.6*Math.abs(Math.sin(t+i))})`;
    ctx.beginPath();ctx.arc(W*sx,H*sy,1.8,0,Math.PI*2);ctx.fill();
  });
  game.cloudX.forEach((cx,i)=>{
    const cy=[H*.1,H*.07,H*.14][i],r=[38,52,32][i];
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.arc(cx+r*.7,cy-r*.2,r*.7,0,Math.PI*2);ctx.arc(cx-r*.5,cy+r*.1,r*.6,0,Math.PI*2);ctx.fill();
    game.cloudX[i]=(cx-.4+W+150)%(W+150)-100;
  });
  const grd=ctx.createLinearGradient(0,g,0,H);
  grd.addColorStop(0,'#2d7a2d');grd.addColorStop(.2,'#1e5c1e');grd.addColorStop(1,'#0d2e0d');
  ctx.fillStyle=grd;ctx.fillRect(0,g,W,H-g);
  ctx.strokeStyle='#4caf50';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,g);ctx.lineTo(W,g);ctx.stroke();
  for(let i=0;i<14;i++){const gx=((game.bgX+i*100)%(W+120))-60;ctx.fillStyle='#3d8c3d';ctx.beginPath();ctx.arc(gx,g+12,3.5,0,Math.PI*2);ctx.fill();}
  drawMosque(W*.04,g-65,.75);drawMosque(W*.65,g-55,.5);
}

function drawMosque(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle='rgba(15,35,55,.65)';
  ctx.beginPath();ctx.arc(30,0,25,Math.PI,0);ctx.fill();
  ctx.fillRect(5,0,50,60);ctx.fillRect(-5,-52,13,80);
  ctx.beginPath();ctx.arc(1.5,-52,7,Math.PI,0);ctx.fill();
  ctx.restore();
}

function drawPlayer(){
  const p=game.player;
  if(p.invincible>0&&Math.floor(p.invincible*8)%2===0)return;
  const x=p.x,y=p.y,H2=p.charH,W2=48;
  const ls=Math.sin(game.frame*.22)*(p.onGround?1:0);
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(x+W2/2,game.groundY+5,W2*.48,6,0,0,Math.PI*2);ctx.fill();
  // Galabiya
  ctx.fillStyle='#f4f0e4';
  ctx.beginPath();ctx.moveTo(x+8,y+22);ctx.lineTo(x+W2-8,y+22);ctx.lineTo(x+W2-2,y+H2-16);ctx.lineTo(x+2,y+H2-16);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#d4c8a8';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x+W2/2,y+22);ctx.lineTo(x+W2/2,y+38);ctx.stroke();
  ctx.fillStyle='#f4f0e4';
  ctx.beginPath();ctx.moveTo(x+8,y+22);ctx.lineTo(x-8+ls*2,y+42);ctx.lineTo(x+2,y+42);ctx.lineTo(x+12,y+24);ctx.fill();
  ctx.beginPath();ctx.moveTo(x+W2-8,y+22);ctx.lineTo(x+W2+8-ls*2,y+42);ctx.lineTo(x+W2-2,y+42);ctx.lineTo(x+W2-12,y+24);ctx.fill();
  ctx.fillStyle='#e8dfc8';ctx.fillRect(x+10,y+H2-18,12,18+ls*4);ctx.fillRect(x+W2-22,y+H2-18,12,18-ls*4);
  ctx.fillStyle='#5a3a1a';
  ctx.beginPath();ctx.ellipse(x+16,y+H2-1,9,4,.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+W2-16,y+H2-1,9,4,-.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FDBCB4';ctx.beginPath();ctx.arc(x+W2/2,y+13,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0ede0';ctx.beginPath();ctx.arc(x+W2/2,y+8,14,Math.PI,0);ctx.fill();ctx.fillRect(x+W2/2-14,y+8,28,5);
  ctx.fillStyle='#2a1a0a';ctx.beginPath();ctx.arc(x+W2/2-4,y+13,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+W2/2+4,y+13,2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#8a5a3a';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x+W2/2,y+17,4,.1,Math.PI-.1);ctx.stroke();
  ctx.restore();
}

// Draw cow/buffalo ahead of player
function drawCow(dt){
  const g=game.groundY;
  const ls=Math.sin(game.frame*.25)*5;
  const bounce=Math.sin(game.frame*.18)*3;
  const x=canvas.width*.55,y=g-65+bounce;
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(x+35,g+4,40,7,0,0,Math.PI*2);ctx.fill();
  // Body - brown cow color
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.ellipse(x+35,y+30,42,26,0,0,Math.PI*2);ctx.fill();
  // White patches
  ctx.fillStyle='#f5f5f5';
  ctx.beginPath();ctx.ellipse(x+28,y+22,18,14,-.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+50,y+35,12,10,.2,0,Math.PI*2);ctx.fill();
  // Neck + Head
  ctx.fillStyle='#7a3a10';
  ctx.beginPath();ctx.moveTo(x+62,y+18);ctx.lineTo(x+80,y+8);ctx.lineTo(x+88,y+28);ctx.lineTo(x+70,y+32);ctx.closePath();ctx.fill();
  // Head
  ctx.fillStyle='#8B4513';ctx.beginPath();ctx.ellipse(x+88,y+18,20,16,.1,0,Math.PI*2);ctx.fill();
  // Muzzle
  ctx.fillStyle='#c49a6c';ctx.beginPath();ctx.ellipse(x+100,y+22,10,8,0,0,Math.PI*2);ctx.fill();
  // Nostrils
  ctx.fillStyle='#5a2a0a';
  ctx.beginPath();ctx.ellipse(x+97,y+24,2.5,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+103,y+24,2.5,2,0,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.arc(x+84,y+14,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(x+85,y+13,1.3,0,Math.PI*2);ctx.fill();
  // Ear
  ctx.fillStyle='#c49a6c';ctx.beginPath();ctx.ellipse(x+82,y+5,5,9,.3,0,Math.PI*2);ctx.fill();
  // Horns
  ctx.strokeStyle='#d4a020';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+80,y+4);ctx.quadraticCurveTo(x+78,y-10,x+84,y-14);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+88,y+2);ctx.quadraticCurveTo(x+92,y-10,x+88,y-15);ctx.stroke();
  // Legs
  ctx.strokeStyle='#6a3010';ctx.lineWidth=7;ctx.lineCap='round';
  [[x+18,ls],[x+32,-ls],[x+48,ls],[x+62,-ls]].forEach(([lx,sw])=>{
    ctx.beginPath();ctx.moveTo(lx,y+50);ctx.lineTo(lx+sw,g-2);ctx.stroke();
  });
  // Hooves
  ctx.fillStyle='#2a1a0a';
  [x+18+ls,x+32-ls,x+48+ls,x+62-ls].forEach(hx=>{ctx.beginPath();ctx.ellipse(hx,g+1,6,3.5,0,0,Math.PI*2);ctx.fill();});
  // Tail
  const t2=Date.now()*.001;
  ctx.strokeStyle='#8B4513';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x-5,y+25);ctx.quadraticCurveTo(x-20+Math.sin(t2*4)*8,y+10,x-15+Math.sin(t2*3)*6,y-5);ctx.stroke();
  // Udder (it's a cow!)
  ctx.fillStyle='#e8a0a0';ctx.beginPath();ctx.ellipse(x+30,y+52,12,8,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawObstacles(){
  game.obstacles.forEach(ob=>{
    ctx.save();
    if(ob.type==='hay'){
      ctx.fillStyle='#d4a017';ctx.fillRect(ob.x,ob.y,ob.w,ob.h);
      ctx.strokeStyle='#a07010';ctx.lineWidth=1;
      for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(ob.x+5+i*8,ob.y+4);ctx.lineTo(ob.x+5+i*8,ob.y+ob.h-4);ctx.stroke();}
      ctx.font='18px serif';ctx.textAlign='center';ctx.fillText('🌾',ob.x+ob.w/2,ob.y-4);
    }else if(ob.type==='pit'){
      const gr=ctx.createLinearGradient(ob.x,ob.y,ob.x,ob.y+80);
      gr.addColorStop(0,'#1a0a00');gr.addColorStop(1,'#000');
      ctx.fillStyle=gr;ctx.fillRect(ob.x,ob.y,ob.w,80);
      ctx.strokeStyle='#7a3a0a';ctx.lineWidth=3;ctx.strokeRect(ob.x,ob.y,ob.w,80);
      ctx.font='22px serif';ctx.textAlign='center';ctx.fillText('🕳️',ob.x+ob.w/2,ob.y+35);
    }else if(ob.type==='bar'){
      ctx.fillStyle='#7a4a1a';ctx.fillRect(ob.x-2,ob.y,ob.w,ob.h);
      ctx.fillStyle='#c8960c';ctx.fillRect(ob.x,ob.y,ob.w-2,9);
      ctx.font='16px serif';ctx.textAlign='center';ctx.fillText('⚠️',ob.x+ob.w/2,ob.y-4);
    }
    ctx.restore();
  });
}

function drawParticles(){
  game.particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

function updateHUD(){
  document.getElementById('hud-score').textContent=Math.floor(game.distance);
  document.getElementById('hud-level').textContent=LEVELS[game.level].label;
  let h='';for(let i=0;i<game.lives;i++)h+='❤️';for(let i=game.lives;i<3;i++)h+='🖤';
  document.getElementById('hud-lives').textContent=h;
}

// ===== UPDATE (delta-time based) =====
function update(dt){
  game.frame++;
  const spd=game.speedPxS; // pixels per second
  game.distance+=spd*dt*.07;
  game.bgX-=spd*dt;
  if(game.bgX<-200)game.bgX+=200;
  checkLevelUp();

  const p=game.player,g=game.groundY;
  p.vy+=0.65*dt*60;p.y+=p.vy*dt*60;
  if(p.y>=g-p.charH){p.y=g-p.charH;p.vy=0;p.onGround=true;}
  p.charH+=((keyState.down&&p.onGround?45:75)-p.charH)*.25;
  if(p.invincible>0)p.invincible-=dt*60;

  // Obstacle spawn (seconds-based)
  game.obstacleTimer-=dt;
  if(game.obstacleTimer<=0){
    spawnObstacle();
    const minGap=Math.max(.9,1.8-spd*.001);
    game.obstacleTimer=minGap+Math.random()*.9;
  }
  game.obstacles.forEach(ob=>{ob.x-=spd*dt;});
  game.obstacles=game.obstacles.filter(ob=>ob.x>-200);

  // Collision
  if(p.invincible<=0){
    const px1=p.x+10,px2=p.x+38,py1=p.y+8,py2=p.y+p.charH-4;
    game.obstacles.forEach(ob=>{
      if(ob.type==='pit'){if(px2>ob.x+8&&px1<ob.x+ob.w-8&&py2>=g-4&&p.onGround)hitPlayer();}
      else{if(px2>ob.x+5&&px1<ob.x+ob.w-5&&py2>ob.y&&py1<ob.y+ob.h)hitPlayer();}
    });
  }

  game.particles.forEach(pt=>{pt.x+=pt.vx*dt*60;pt.y+=pt.vy*dt*60;pt.vy+=.12*dt*60;pt.life-=.04*dt*60;});
  game.particles=game.particles.filter(pt=>pt.life>0);

  // Win at level 5
  if(game.level===LEVELS.length-1&&game.distance>=LEVELS[LEVELS.length-1].dist+600) endGame(true);
}

function hitPlayer(){
  game.lives--;game.player.invincible=85;
  spawnParticles(game.player.x+24,game.player.y+game.player.charH/2,'#e74c3c',12);
  updateHUD();if(game.lives<=0)endGame(false);
}

// ===== LOOP =====
function loop(timestamp){
  if(!game.running)return;
  if(!lastTime)lastTime=timestamp;
  const dt=Math.min((timestamp-lastTime)/1000,.05);
  lastTime=timestamp;
  update(dt);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg();drawObstacles();drawCow(dt);drawPlayer();drawParticles();updateHUD();
  animId=requestAnimationFrame(loop);
}

// ===== RESULT =====
function endGame(won){
  game.running=false;cancelAnimationFrame(animId);stopMusic();
  let tier=0;
  if(game.distance>=LEVELS[0].dist+80)tier=1;
  if(game.distance>=LEVELS[1].dist+80)tier=2;
  if(game.distance>=LEVELS[2].dist+80)tier=3;
  if(game.distance>=LEVELS[3].dist+80)tier=4;
  if(game.distance>=LEVELS[4].dist+80||won)tier=5;
  const prize=PRIZES[tier],name=sessionStorage.getItem('eid_name')||'يا صاحبي';
  document.getElementById('result-emoji').textContent=prize.emoji;
  document.getElementById('result-title').textContent=prize.title;
  document.getElementById('result-name').textContent=name;
  document.getElementById('prize-badge').textContent=prize.prize;
  document.getElementById('result-msg').textContent=prize.msg.replace(/{name}/g,name);
  setTimeout(()=>{document.getElementById('result-overlay').classList.add('show');if(tier>=1)launchConfetti();},500);
}

function restartGame(){
  document.getElementById('result-overlay').classList.remove('show');
  if(animId)cancelAnimationFrame(animId);
  lastTime=null;initGame();playMusic();
  showBanner('ليفل 1 🐄 يلا!');
  requestAnimationFrame(loop);
}
function goHome(){window.location.href='index.html';}

// ===== CONFETTI =====
function launchConfetti(){
  const colors=['#d4a017','#f0c040','#27923e','#e74c3c','#fff','#f39c12'];
  for(let i=0;i<90;i++)setTimeout(()=>{
    const d=document.createElement('div');d.className='confetti-piece';
    d.style.left=(Math.random()*100)+'vw';d.style.top='-12px';
    d.style.width=(7+Math.random()*9)+'px';d.style.height=(7+Math.random()*9)+'px';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.borderRadius=Math.random()>.5?'50%':'2px';
    d.style.animationDuration=(1.8+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(d);setTimeout(()=>d.remove(),4000);
  },i*25);
}

// ===== MUSIC =====
let ytPlayer=null,ytReady=false,ytMuted=false;
const ytTag=document.createElement('script');ytTag.src='https://www.youtube.com/iframe_api';document.head.appendChild(ytTag);
window.onYouTubeIframeAPIReady=function(){
  const div=document.createElement('div');div.id='yt-frame';
  div.style.cssText='position:fixed;bottom:-200px;left:-200px;width:1px;height:1px;';
  document.body.appendChild(div);
  ytPlayer=new YT.Player('yt-frame',{height:'1',width:'1',videoId:'DcArtUUQxkk',
    playerVars:{autoplay:0,loop:1,playlist:'DcArtUUQxkk',controls:0},
    events:{onReady:()=>{ytReady=true;try{ytPlayer.playVideo();}catch(e){}}}
  });
};
function playMusic(){if(ytReady&&ytPlayer){try{ytPlayer.playVideo();}catch(e){}document.getElementById('music-btn').style.display='block';}else setTimeout(playMusic,1000);}
function stopMusic(){if(ytReady&&ytPlayer)try{ytPlayer.stopVideo();}catch(e){}}
function toggleMusic(){
  if(!ytPlayer)return;
  const btn=document.getElementById('music-btn');
  if(ytMuted){ytPlayer.unMute();btn.textContent='🔊 كتم';}else{ytPlayer.mute();btn.textContent='🔇 تشغيل';}
  ytMuted=!ytMuted;
}

// ===== START =====
initGame();
showBanner('ليفل 1 🐄 يلا!');
playMusic();
requestAnimationFrame(loop);
</script>
