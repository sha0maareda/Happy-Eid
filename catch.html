<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>اصطد الخروف! 🐑</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#060d1a;font-family:'Tajawal',sans-serif;}
#gameCanvas{position:fixed;top:0;left:0;width:100%;height:100%;}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:.6rem 1rem;background:rgba(0,0,0,.55);color:white;z-index:10;}
.hud-score{font-size:1.2rem;font-weight:700;color:#f0c040;}
.hud-level{font-size:1rem;font-weight:700;color:#f0c040;}
#level-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(0,0,0,.9);color:#f0c040;font-size:clamp(1.5rem,6vw,2.8rem);font-weight:900;padding:.8rem 2rem;border-radius:16px;border:2px solid #f0c040;z-index:30;text-align:center;pointer-events:none;transition:transform .35s cubic-bezier(.175,.885,.32,1.275);}
#level-banner.show{transform:translate(-50%,-50%) scale(1);}
.result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:50;padding:1rem;opacity:0;pointer-events:none;transition:opacity .5s;}
.result-overlay.show{opacity:1;pointer-events:all;}
.result-card{background:linear-gradient(160deg,#0d3b1a,#1e6b2e);border:2px solid rgba(212,160,23,.55);border-radius:28px;padding:2.5rem 2rem;width:min(440px,95vw);text-align:center;}
.result-emoji{font-size:4.5rem;display:block;margin-bottom:.5rem;animation:bb .8s ease infinite alternate;}
@keyframes bb{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.result-title{font-size:clamp(1.3rem,5vw,2rem);font-weight:900;color:#f0c040;margin-bottom:.3rem;}
.result-name{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;color:white;margin-bottom:.8rem;}
.prize-badge{display:inline-block;background:#d4a017;color:#1a1a1a;font-weight:900;font-size:1.3rem;padding:.4rem 1.4rem;border-radius:50px;margin-bottom:1rem;}
.result-msg{font-size:1rem;color:rgba(255,255,255,.88);line-height:1.8;margin-bottom:1.5rem;white-space:pre-line;}
.result-btns{display:flex;gap:.8rem;}
.retry-btn{flex:1;padding:.85rem;background:transparent;color:#f0c040;border:2px solid #f0c040;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.home-btn{flex:1;padding:.85rem;background:#d4a017;color:#1a1a1a;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;}
.confetti-piece{position:fixed;pointer-events:none;animation:cf linear forwards;border-radius:2px;z-index:100;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
#music-btn{position:fixed;bottom:1rem;left:1rem;background:rgba(0,0,0,.5);color:white;border:1px solid rgba(255,255,255,.3);border-radius:50px;padding:.4rem .9rem;font-family:'Tajawal',sans-serif;font-size:.85rem;cursor:pointer;z-index:20;display:none;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="hud">
  <div>الخرفان: <span class="hud-score" id="hud-score">0</span></div>
  <div class="hud-level" id="hud-level">ليفل 1 🐑</div>
  <div id="hud-lives" style="font-size:1.3rem;letter-spacing:2px">❤️❤️❤️</div>
</div>
<div id="level-banner"></div>
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <span class="result-emoji" id="result-emoji">🐑</span>
    <div class="result-title" id="result-title"></div>
    <div class="result-name"  id="result-name"></div>
    <div class="prize-badge"  id="prize-badge"></div>
    <div class="result-msg"   id="result-msg"></div>
    <div class="result-btns">
      <button class="retry-btn" onclick="restartGame()">🔄 العب تاني</button>
      <button class="home-btn"  onclick="goHome()">🏠 الرئيسية</button>
    </div>
  </div>
</div>
<button id="music-btn" onclick="toggleMusic()">🔊 كتم</button>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// ===== 5 LEVELS =====
const LEVELS=[
  {target:8,  speedBase:230, spawnRate:85, label:'ليفل 1 🐑'},
  {target:18, speedBase:290, spawnRate:68, label:'ليفل 2 🐑🐑'},
  {target:32, speedBase:350, spawnRate:52, label:'ليفل 3 🐑🐑🐑'},
  {target:50, speedBase:420, spawnRate:38, label:'ليفل 4 🔥'},
  {target:72, speedBase:500, spawnRate:26, label:'ليفل 5 👑 !'},
];
// speedBase = pixels per SECOND (fixes mobile slowdown)

const PRIZES=[
  {emoji:'😅',title:'عيد لحمة!',         prize:'مفيش عيدية 😂',      msg:'كل سنة وانت طيب يا {name}!\nالخرفان أسرع منك النهارده 🐑\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'💵',title:'ليفل 1 ✅!',  prize:'🎉 10 جنيه عيدية',   msg:'عيدك مبارك يا {name}! 🌟\nكسبت 10 جنيه عيدية\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'💵',title:'ليفل 2 ✅!', prize:'💚 50 جنيه عيدية',   msg:'عيدك مبارك يا{name}! 🌟🌟\nكسبت 50 جنيه عيدية\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'💵',title:'ليفل 3 ✅!', prize:'💛 100 جنيه عيدية',  msg:'عيدك مبارك يا{name}! 🌟🌟🌟\nكسبت 100 جنيه عيدية\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'💵',title:'ليفل 4 ✅!',prize:'🧡 200 جنيه عيدية', msg:'عيدك مبارك يا{name}!  🌟🌟🌟🌟\nكسبت 200 جنيه عيدية!\nأدام الله أعيادك وفرحتك ورزقك حج بيته الحرام 🕌❤️'},
  {emoji:'🥩',title:'ليفل 5 👑!',   prize:'🥩 5 كيلو لحمة!',    msg:'عيدك مبارك يا{name}! 🌟🌟🌟🌟🌟🏆\nعديت كل الليفلات!\nكسبت 5 كيلو لحمة!\nأدام الله أعيادكم وفرحتكم ورزقكم حج بيته الحرام\nكل عام وأنتم بخير ❤️🌟🎊'},
];

let score=0,lives=3,level=0,levelReached=0;
let items=[],particles=[],bgStars=[];
let spawnTimer=0,gameRunning=true;
let lastTime=null;

for(let i=0;i<60;i++) bgStars.push({x:Math.random(),y:Math.random()*.6,r:1+Math.random()*2,t:Math.random()*Math.PI*2});

// Only sheep emojis now
const SHEEP_EMOJIS=['🐑','🐑','🐑','🐑','🐑'];

function spawnItem(){
  const W=canvas.width;
  const size=60+Math.random()*25;
  const speedPx=LEVELS[level].speedBase*(1+Math.random()*.4)/60; // px per frame at 60fps equiv
  items.push({
    x:40+Math.random()*(W-80),
    y:-size,
    size,
    speedPx,
    wobble:Math.random()*Math.PI*2,
    hit:false,hitAnim:0,
    emoji:SHEEP_EMOJIS[Math.floor(Math.random()*SHEEP_EMOJIS.length)],
  });
}

function checkLevel(){
  for(let i=LEVELS.length-1;i>=0;i--){
    if(score>=LEVELS[i].target&&i>level){
      level=i; levelReached=Math.max(levelReached,i);
      showBanner(LEVELS[i].label);
      // Win if passed all levels
      if(i===LEVELS.length-1&&score>=LEVELS[LEVELS.length-1].target) setTimeout(()=>endGame(true),800);
      break;
    }
  }
}

function showBanner(text){
  const b=document.getElementById('level-banner');
  b.textContent=text;b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),1800);
}

function spawnParticles(x,y,color,n){
  for(let i=0;i<n;i++) particles.push({x,y,vx:(Math.random()-.5)*7,vy:-Math.random()*7,life:1,color,size:5+Math.random()*6});
}

// ===== DRAW =====
function drawBg(){
  const W=canvas.width,H=canvas.height;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#060d1a');sky.addColorStop(.5,'#0d2040');sky.addColorStop(1,'#1e4a1e');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Moon
  ctx.save();ctx.fillStyle='#fffde0';ctx.shadowColor='#fffde0';ctx.shadowBlur=40;
  ctx.beginPath();ctx.arc(W*.82,75,45,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0d2040';ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(W*.82+18,62,38,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Stars
  const t=Date.now()*.001;
  bgStars.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,220,${.4+.6*Math.abs(Math.sin(s.t+t))})`;
    ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
  });
  // Ground
  const grd=ctx.createLinearGradient(0,H*.78,0,H);
  grd.addColorStop(0,'#1e5c1e');grd.addColorStop(1,'#0d2e0d');
  ctx.fillStyle=grd;ctx.fillRect(0,H*.78,W,H*.22);
  // Danger line
  ctx.strokeStyle='rgba(212,160,23,.3)';ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(0,H*.78);ctx.lineTo(W,H*.78);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(212,160,23,.5)';ctx.font=`bold ${Math.min(13,W*.03)}px Tajawal`;
  ctx.textAlign='right';ctx.fillText('⚠️ لا توصلوا هنا!',W-10,H*.78-6);
  // Mosque
  drawMosque(W*.06,H*.78,0.6);drawMosque(W*.7,H*.78,0.45);
}

function drawMosque(x,y,s){
  ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle='rgba(20,40,60,.7)';
  ctx.beginPath();ctx.arc(30,0,25,Math.PI,0);ctx.fill();
  ctx.fillRect(5,0,50,55);ctx.fillRect(-4,-48,12,75);
  ctx.beginPath();ctx.arc(2,-48,6,Math.PI,0);ctx.fill();
  ctx.restore();
}

function drawItems(){
  items.forEach(s=>{
    ctx.save();
    if(s.hit){ctx.globalAlpha=1-s.hitAnim;ctx.translate(s.x,s.y-s.hitAnim*30);const sc=1+s.hitAnim*.5;ctx.scale(sc,sc);}
    else{ctx.translate(s.x,s.y);}
    ctx.font=`${s.size}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.emoji,Math.sin(Date.now()*.004+s.wobble)*4,0);
    ctx.restore();
  });
}

function drawParticles(){
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-level').textContent=LEVELS[level].label;
  let h='';for(let i=0;i<lives;i++)h+='❤️';for(let i=lives;i<3;i++)h+='🖤';
  document.getElementById('hud-lives').textContent=h;
}

// ===== INPUT =====
function handleTap(cx,cy){
  if(!gameRunning)return;
  for(let i=items.length-1;i>=0;i--){
    const s=items[i];if(s.hit)continue;
    const dx=cx-s.x,dy=cy-s.y;
    if(Math.sqrt(dx*dx+dy*dy)<s.size*.65){
      s.hit=true;s.hitAnim=0;score++;
      spawnParticles(s.x,s.y,'#f0c040',10);
      checkLevel();break;
    }
  }
}
canvas.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{e.preventDefault();Array.from(e.changedTouches).forEach(t=>handleTap(t.clientX,t.clientY));},{passive:false});

// ===== LOOP (delta-time based = same speed on all devices) =====
function loop(timestamp){
  if(!gameRunning)return;
  if(!lastTime)lastTime=timestamp;
  const dt=Math.min((timestamp-lastTime)/1000,0.05); // seconds, max 50ms
  lastTime=timestamp;

  const H=canvas.height,dangerY=H*.78;

  // Spawn (still frame-based but adjusted)
  spawnTimer-=dt*60;
  if(spawnTimer<=0){spawnItem();spawnTimer=LEVELS[level].spawnRate+Math.random()*25;}

  // Update items with delta time
  for(let i=items.length-1;i>=0;i--){
    const s=items[i];
    if(s.hit){
      s.hitAnim+=dt*3.5;
      if(s.hitAnim>=1)items.splice(i,1);
    } else {
      s.y+=s.speedPx*dt*60; // normalize to 60fps
      if(s.y>dangerY+s.size/2){
        items.splice(i,1);
        spawnParticles(s.x,dangerY,'#e74c3c',6);
        lives--;updateHUD();
        if(lives<=0){endGame(false);return;}
      }
    }
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=0.15*dt*60;p.life-=0.035*dt*60;});
  particles=particles.filter(p=>p.life>0);

  drawBg();drawItems();drawParticles();updateHUD();
  requestAnimationFrame(loop);
}

function endGame(won){
  gameRunning=false;stopMusic();
  let tier=0;
  if(score>=LEVELS[0].target)tier=1;
  if(score>=LEVELS[1].target)tier=2;
  if(score>=LEVELS[2].target)tier=3;
  if(score>=LEVELS[3].target)tier=4;
  if(score>=LEVELS[4].target||won)tier=5;
  const prize=PRIZES[tier],name=sessionStorage.getItem('eid_name')||'يا صاحبي';
  document.getElementById('result-emoji').textContent=prize.emoji;
  document.getElementById('result-title').textContent=prize.title;
  document.getElementById('result-name').textContent=name;
  document.getElementById('prize-badge').textContent=prize.prize;
  document.getElementById('result-msg').textContent=prize.msg.replace(/{name}/g,name);
  setTimeout(()=>{document.getElementById('result-overlay').classList.add('show');if(tier>=1)launchConfetti();},600);
}

function restartGame(){
  document.getElementById('result-overlay').classList.remove('show');
  score=0;lives=3;level=0;levelReached=0;items=[];particles=[];spawnTimer=60;gameRunning=true;lastTime=null;
  playMusic();requestAnimationFrame(loop);
}
function goHome(){window.location.href='index.html';}

// ===== CONFETTI =====
function launchConfetti(){
  const colors=['#d4a017','#f0c040','#27923e','#e74c3c','#fff','#f39c12'];
  for(let i=0;i<90;i++)setTimeout(()=>{
    const d=document.createElement('div');d.className='confetti-piece';
    d.style.left=(Math.random()*100)+'vw';d.style.top='-12px';
    d.style.width=(7+Math.random()*9)+'px';d.style.height=(7+Math.random()*9)+'px';
    d.style.background=colors[Math.floor(Math.random()*colors.length)];
    d.style.borderRadius=Math.random()>.5?'50%':'2px';
    d.style.animationDuration=(1.8+Math.random()*2)+'s';
    d.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(d);setTimeout(()=>d.remove(),4000);
  },i*25);
}

// ===== MUSIC =====
let ytPlayer=null,ytReady=false,ytMuted=false;
const ytTag=document.createElement('script');ytTag.src='https://www.youtube.com/iframe_api';document.head.appendChild(ytTag);
window.onYouTubeIframeAPIReady=function(){
  const div=document.createElement('div');div.id='yt-frame';
  div.style.cssText='position:fixed;bottom:-200px;left:-200px;width:1px;height:1px;';
  document.body.appendChild(div);
  ytPlayer=new YT.Player('yt-frame',{
    height:'1',width:'1',videoId:'DcArtUUQxkk',
    playerVars:{autoplay:0,loop:1,playlist:'DcArtUUQxkk',controls:0},
    events:{onReady:()=>{ytReady=true;try{ytPlayer.playVideo();}catch(e){}}}
  });
};
function playMusic(){if(ytReady&&ytPlayer){try{ytPlayer.playVideo();}catch(e){}document.getElementById('music-btn').style.display='block';}else setTimeout(playMusic,1000);}
function stopMusic(){if(ytReady&&ytPlayer)try{ytPlayer.stopVideo();}catch(e){}}
function toggleMusic(){
  if(!ytPlayer)return;
  const btn=document.getElementById('music-btn');
  if(ytMuted){ytPlayer.unMute();btn.textContent='🔊 كتم';}else{ytPlayer.mute();btn.textContent='🔇 تشغيل';}
  ytMuted=!ytMuted;
}

// ===== START =====
showBanner('ليفل 1 🐑 يلا!');
playMusic();
requestAnimationFrame(loop);
</script>
</body>
</html>
